<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Manta School — dev preview</title>
    <style>
      html, body { margin: 0; height: 100%; background: #08182f; overflow: hidden; font-family: system-ui, sans-serif; }
      .demo-content {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; z-index: 2;
      }
      .demo-card {
        background: rgba(255,255,255,0.86); color: #1f2937; padding: 26px 34px;
        border-radius: 14px; max-width: 460px; box-shadow: 0 12px 44px rgba(0,0,0,0.4);
        backdrop-filter: blur(2px);
      }
      .demo-card h2 { margin-top: 0; }
      .demo-nav a {
        display: inline-block; margin-right: 12px; padding: 8px 16px; border-radius: 8px;
        background: #1c2c5e; color: #fff; text-decoration: none; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div id="manta-root"></div>
    <div class="demo-content">
      <div class="demo-card">
        <h2>🐟 Voxel Manta School</h2>
        <p>A school of voxel mantas (navy back / white belly) drifting past.
        Click a link to trigger the ocean-veil page transition + swoosh.</p>
        <nav class="demo-nav">
          <a href="/?page=a">Tab A</a>
          <a href="/?page=b">Tab B</a>
        </nav>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
